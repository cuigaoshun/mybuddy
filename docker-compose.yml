services:
  mybuddy:
    image: mybuddy
    container_name: mybuddy-app
    working_dir: /workspace
    ports:
      - "8000:8000"
    volumes:
      - /home/Project/mybuddy:/workspace
    env_file:
      - .env
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
